<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多肉咖啡 | 線上點餐</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8F9FA; padding-bottom: 160px; }
        .qty-btn {
            width: 26px; height: 26px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; cursor: pointer; user-select: none;
            transition: all 0.2s;
        }
        .minus-btn { background-color: #E9ECEF; color: #495057; }
        .plus-btn { color: white; }
        .hot-theme { background-color: #E53935; } 
        .cold-theme { background-color: #1E88E5; } 
        .default-theme { background-color: #FB8C00; } 
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .open { background-color: #4CAF50; box-shadow: 0 0 8px #4CAF50; }
        .closed { background-color: #9E9E9E; }
        .payment-option input:checked + div, .type-option input:checked + div {
            border-color: #2E7D32;
            background-color: #E8F5E9;
            color: #1B5E20;
        }
    </style>
</head>
<body>

    <div class="bg-stone-800 text-white p-5 rounded-b-3xl shadow-lg sticky top-0 z-20">
        <div class="flex justify-between items-start">
            <div>
                <h1 class="text-xl font-bold tracking-wide">☕ 多肉咖啡</h1>
                <p class="text-xs text-stone-400 mt-1">公休日：每週一<br>平日：14:00 - 19:00 | 假日：14:30 - 19:00</p>
            </div>
            <div id="shop-status" class="bg-stone-700 px-3 py-1 rounded-full text-xs font-bold flex items-center border border-stone-600">
                檢測中...
            </div>
        </div>
    </div>

    <div class="px-4 py-4 grid gap-4" id="menu-container"></div>

    <div class="px-4 mt-2">
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
            <h3 class="font-bold text-gray-700 mb-3 border-b pb-2">📋 訂購資訊</h3>
            <div class="space-y-3">
                <div class="grid grid-cols-2 gap-3 mb-2">
                    <label class="type-option cursor-pointer">
                        <input type="radio" name="orderType" value="內用" class="hidden" checked onchange="updateOrderType()">
                        <div class="border border-gray-200 rounded-lg p-2 text-center text-sm font-bold text-gray-500 transition-all">🍽️ 內用</div>
                    </label>
                    <label class="type-option cursor-pointer">
                        <input type="radio" name="orderType" value="外帶" class="hidden" onchange="updateOrderType()">
                        <div class="border border-gray-200 rounded-lg p-2 text-center text-sm font-bold text-gray-500 transition-all">🛍️ 外帶</div>
                    </label>
                </div>

                <input type="text" id="tableNumber" placeholder="內用桌號(外桌or內桌)*" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg text-sm">
                <textarea id="customerNote" rows="1" placeholder="備註" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg text-sm"></textarea>

                <div class="pt-2">
                    <label class="block text-sm font-bold text-gray-700 mb-2">付款方式</label>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="payment-option cursor-pointer">
                            <input type="radio" name="payment" value="現金" class="hidden" checked onchange="updatePaymentHint()">
                            <div class="border border-gray-200 rounded-lg p-3 text-center text-sm font-bold text-gray-500 transition-all">💵 現金支付</div>
                        </label>
                        <label class="payment-option cursor-pointer">
                            <input type="radio" name="payment" value="LINE Pay" class="hidden" onchange="updatePaymentHint()">
                            <div class="border border-gray-200 rounded-lg p-3 text-center text-sm font-bold text-gray-500 transition-all">💳 LINE Pay</div>
                        </label>
                    </div>
                    <p id="payment-hint" class="text-xs text-red-500 mt-2 hidden bg-red-50 p-2 rounded border border-red-100">
                        ⚠️ 使用 LINE Pay，請至櫃檯掃描收款碼。
                    </p>
                </div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] z-30">
        <div class="flex justify-between items-end mb-3">
            <div class="text-sm text-gray-500">
                共 <span id="total-count" class="font-bold text-gray-800">0</span> 樣商品
            </div>
            <div class="text-right">
                <div class="text-gray-800 font-bold text-lg leading-none">
                    總計 $<span id="subtotal-price">0</span>
                </div>
            </div>
        </div>
        <button onclick="submitOrder()" id="submit-btn" class="w-full bg-stone-700 text-white font-bold py-3 rounded-xl shadow-md disabled:bg-gray-300 disabled:cursor-not-allowed" disabled>
            請先選擇商品
        </button>
    </div>

    <script>
        const YOUR_LIFF_ID = "2008538785-jQ0Wm6px"; 

        const menuItems = [
            { id: 'c1', name: '美式咖啡', price: 80, type: 2, desc: '經典黑咖啡', img: 'https://placehold.co/100x100/3e2723/fff?text=Americano' },
            { id: 'c2', name: '拿鐵咖啡', price: 120, type: 2, desc: '濃縮咖啡與鮮奶', img: 'https://placehold.co/100x100/5d4037/fff?text=Latte' },
            { id: 'c3', name: '摩卡咖啡', price: 130, type: 2, desc: '巧克力風味咖啡', img: 'https://placehold.co/100x100/4e342e/fff?text=Mocha' },
            { id: 't1', name: '可可牛奶', price: 50, type: 2, desc: '香濃巧克力與無乳糖牛奶', img: 'https://placehold.co/100x100/b71c1c/fff?text=Cocoa' },
            { id: 't2', name: '紅茶拿鐵', price: 80, type: 2, desc: '精選紅茶與無乳糖牛奶', img: 'https://placehold.co/100x100/a1887f/fff?text=TeaLatte' },
            { id: 'd1', name: '綠茶拿鐵', price: 60, type: 2, desc: '精選綠茶與無乳糖牛奶', img: 'https://placehold.co/100x100/3e2723/fff?text=GreenTeaLatte' },
            { id: 'h1', name: '高山冬片茶', price: 100, type: 1, desc: '現泡熱茶', img: 'https://placehold.co/100x100/689f38/fff?text=Tea' },
            { id: 'h2', name: '草莓風味果茶', price: 120, type: 1, desc: '酸甜莓果香氣', img: 'https://placehold.co/100x100/e91e63/fff?text=StrawberryTea' },
            { id: 'h3', name: '麝香葡萄風味茶', price: 150, type: 1, desc: '濃郁葡萄果香', img: 'https://placehold.co/100x100/8e24aa/fff?text=GrapeTea' },
            { id: 'ice1', name: '可爾必思', price: 50, type: 0, desc: '乳酸氣泡飲', img: 'https://placehold.co/100x100/039be5/fff?text=Calpis' },
            { id: 'ice2', name: '春梅', price: 100, type: 0, desc: '青梅醋氣泡飲', img: 'https://placehold.co/100x100/039be5/fff?text=Plum' },
            { id: 'ice3', name: '夏戀', price: 100, type: 0, desc: '石榴醋氣泡飲', img: 'https://placehold.co/100x100/039be5/fff?text=Pomegranate' },
            { id: 'ice4', name: '阿尼亞', price: 150, type: 0, desc: '咖啡基底乳酸氣泡特調', img: 'https://placehold.co/100x100/ff6f00/fff?text=Anya' },
            { id: 'f1', name: '原味鬆餅', price: 50, type: null, desc: ' ', img: 'https://placehold.co/100x100/ffb74d/fff?text=Waffle' },
            { id: 'f2', name: '榛果巧克力鬆餅', price: 70, type: null, desc: '榛果巧克力醬', img: 'https://placehold.co/100x100/5d4037/fff?text=ChocoWaffle' },
            { id: 'f3', name: '草莓果醬鬆餅', price: 70, type: null, desc: '草莓果醬', img: 'https://placehold.co/100x100/e91e63/fff?text=StrawberryWaffle' },
            { id: 'f4', name: 'Ｑ心麻糬鬆餅', price: 100, type: null, desc: '內餡Q彈麻糬', img: 'https://placehold.co/100x100/fff9c4/333?text=MochiWaffle' },
            { id: 'f5', name: '嘉年華鬆餅', price: 120, type: null, desc: '三種味道一次滿足', img: 'https://placehold.co/100x100/f48fb1/fff?text=Carnival' },
            { id: 's1', name: '香絲(小)', price: 30, type: null, desc: '烘烤鱈魚香絲', img: 'https://placehold.co/100x100/ffecb3/333?text=Codfish' },
            { id: 's2', name: '香絲(大)', price: 60, type: null, desc: '烘烤鱈魚香絲', img: 'https://placehold.co/100x100/ffecb3/333?text=Codfish' },
            { id: 's3', name: '香魚片', price: 60, type: null, desc: '涮嘴小零食', img: 'https://placehold.co/100x100/ffecb3/333?text=Fish' },
            { id: 's4', name: '多肉布丁', price: 70, type: null, desc: '手工焦糖布丁', img: 'https://placehold.co/100x100/ef5350/fff?text=Pudding' }
        ];

        let cart = {}; 

        document.addEventListener('DOMContentLoaded', function() {
            liff.init({ liffId: YOUR_LIFF_ID }).catch(err => console.error(err));
            checkBusinessHours();
            renderMenu();
        });

        function checkBusinessHours() {
            const now = new Date();
            const hour = now.getHours();
            const day = now.getDay();
            const statusEl = document.getElementById('shop-status');

            if (day === 1) { // 每週一公休
                statusEl.innerHTML = '<span class="status-dot closed"></span> 今日公休';
            } else if (hour >= 14 && hour < 19) {
                statusEl.innerHTML = '<span class="status-dot open"></span> 營業中';
                statusEl.classList.add('text-green-300');
            } else {
                statusEl.innerHTML = '<span class="status-dot closed"></span> 非營業時間';
            }
        }

        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = menuItems.map(item => {
                let controls = '';
                if (item.type === 2) {
                    controls = `
                        <div class="flex items-center justify-between mt-2">
                            <span class="text-xs font-bold text-red-500 mr-2 border border-red-200 px-1 rounded bg-red-50">熱飲</span>
                            <div class="flex items-center">
                                <div class="qty-btn minus-btn" onclick="updateCart('${item.id}', 'hot', -1)">-</div>
                                <span class="mx-2 font-bold w-4 text-center text-sm" id="qty-${item.id}-hot">0</span>
                                <div class="qty-btn plus-btn hot-theme" onclick="updateCart('${item.id}', 'hot', 1)">+</div>
                            </div>
                        </div>
                        <div class="flex items-center justify-between mt-2">
                            <span class="text-xs font-bold text-blue-500 mr-2 border border-blue-200 px-1 rounded bg-blue-50">冰飲</span>
                            <div class="flex items-center">
                                <div class="qty-btn minus-btn" onclick="updateCart('${item.id}', 'cold', -1)">-</div>
                                <span class="mx-2 font-bold w-4 text-center text-sm" id="qty-${item.id}-cold">0</span>
                                <div class="qty-btn plus-btn cold-theme" onclick="updateCart('${item.id}', 'cold', 1)">+</div>
                            </div>
                        </div>`;
                } else if (item.type === 1 || item.type === 0) {
                    const label = item.type === 1 ? '僅熱飲' : '僅冰飲';
                    const theme = item.type === 1 ? 'hot-theme' : 'cold-theme';
                    const variant = item.type === 1 ? 'hot' : 'cold';
                    controls = `
                        <div class="flex items-center justify-between mt-2">
                            <span class="text-xs font-bold ${item.type === 1 ? 'text-red-500' : 'text-blue-500'} mr-2">${label}</span>
                            <div class="flex items-center">
                                <div class="qty-btn minus-btn" onclick="updateCart('${item.id}', '${variant}', -1)">-</div>
                                <span class="mx-2 font-bold w-4 text-center text-sm" id="qty-${item.id}-${variant}">0</span>
                                <div class="qty-btn plus-btn ${theme}" onclick="updateCart('${item.id}', '${variant}', 1)">+</div>
                            </div>
                        </div>`;
                } else {
                    controls = `
                        <div class="flex items-center justify-end mt-2">
                            <div class="qty-btn minus-btn" onclick="updateCart('${item.id}', 'default', -1)">-</div>
                            <span class="mx-2 font-bold w-4 text-center text-sm" id="qty-${item.id}-default">0</span>
                            <div class="qty-btn plus-btn default-theme" onclick="updateCart('${item.id}', 'default', 1)">+</div>
                        </div>`;
                }

                return `
                <div class="bg-white p-3 rounded-2xl flex shadow-sm border border-gray-100">
                    <img src="${item.img}" class="w-24 h-24 rounded-xl object-cover mr-4 flex-shrink-0">
                    <div class="flex-1 flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start">
                                <h3 class="font-bold text-gray-800">${item.name}</h3>
                                <span class="text-gray-900 font-bold">$${item.price}</span>
                            </div>
                            <p class="text-xs text-gray-400 mt-1 line-clamp-2">${item.desc}</p>
                        </div>
                        ${controls}
                    </div>
                </div>`;
            }).join('');
        }

        function updateCart(itemId, variant, change) {
            const key = `${itemId}-${variant}`;
            if (!cart[key]) cart[key] = 0;
            cart[key] += change;
            if (cart[key] < 0) cart[key] = 0;
            document.getElementById(`qty-${key}`).innerText = cart[key];
            calculateTotal();
        }

        function calculateTotal() {
            let totalQty = 0, foodPrice = 0;
            for (const [key, qty] of Object.entries(cart)) {
                if (qty > 0) {
                    const item = menuItems.find(i => i.id === key.split('-')[0]);
                    totalQty += qty;
                    foodPrice += (item.price * qty);
                }
            }
            document.getElementById('total-count').innerText = totalQty;
            document.getElementById('subtotal-price').innerText = foodPrice;
            const submitBtn = document.getElementById('submit-btn');
            if (totalQty === 0) {
                submitBtn.disabled = true;
                submitBtn.innerText = "請先選擇商品";
            } else {
                submitBtn.disabled = false;
                submitBtn.innerText = `送出訂單 (總計 $${foodPrice})`;
            }
        }

        function updateOrderType() {
            const type = document.querySelector('input[name="orderType"]:checked').value;
            const tableInput = document.getElementById('tableNumber');
            tableInput.placeholder = type === '內用' ? '內用桌號(外桌 or 內桌) *' : '稱謂：(選填)例：林小姐';
        }

        function updatePaymentHint() {
            const payment = document.querySelector('input[name="payment"]:checked').value;
            document.getElementById('payment-hint').classList.toggle('hidden', payment !== 'LINE Pay');
        }

        function submitOrder() {
            const name = document.getElementById('customerName').value.trim();
            const table = document.getElementById('tableNumber').value.trim();
            const type = document.querySelector('input[name="orderType"]:checked').value;
            const note = document.getElementById('customerNote').value.trim();
            const payment = document.querySelector('input[name="payment"]:checked').value;

            if (!name || (type === '內用' && !table)) {
                alert('請填寫「稱呼」與「桌號」！');
                return;
            }

            let details = "", total = 0;
            for (const [key, qty] of Object.entries(cart)) {
                if (qty > 0) {
                    const [id, variant] = key.split('-');
                    const item = menuItems.find(i => i.id === id);
                    const sub = item.price * qty;
                    total += sub;
                    const vText = variant === 'hot' ? '🔥熱' : (variant === 'cold' ? '❄️冰' : '');
                    details += `▫️ ${item.name} ${vText} x${qty} ($${sub})\n`;
                }
            }

            const message = `【${type}訂單】${payment}\n` +
                            `👤 稱呼：${name}\n` +
                            `📍 桌號/編號：${table || '無'}\n` +
                            `📝 備註：${note || '無'}\n` +
                            `------------------\n${details}` +
                            `------------------\n💰 總金額：$${total}`;

            if (liff.isInClient()) {
                liff.sendMessages([{ type: 'text', text: message }])
                    .then(() => liff.closeWindow()).catch(err => alert(err));
            } else {
                alert("電腦版預覽：\n\n" + message);
            }
        }
    </script>
</body>
</html>
