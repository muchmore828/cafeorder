<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多肉咖啡 | 線上點餐</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8F9FA; padding-bottom: 160px; }
        
        /* 數量按鈕樣式 */
        .qty-btn {
            width: 26px; height: 26px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; cursor: pointer; user-select: none;
            transition: all 0.2s;
        }
        .minus-btn { background-color: #E9ECEF; color: #495057; }
        .plus-btn { color: white; }
        
        /* 冷熱標籤顏色 */
        .hot-theme { background-color: #E53935; } /* 紅色 */
        .cold-theme { background-color: #1E88E5; } /* 藍色 */
        .default-theme { background-color: #FB8C00; } /* 橘色 (食物) */

        /* 營業狀態燈號 */
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .open { background-color: #4CAF50; box-shadow: 0 0 8px #4CAF50; }
        .closed { background-color: #9E9E9E; }

        /* 支付選項選中樣式 */
        .payment-option input:checked + div {
            border-color: #2E7D32;
            background-color: #E8F5E9;
            color: #1B5E20;
        }
    </style>
</head>
<body>

    <!-- 1. 頂部 Hero 區塊 (含營業狀態判斷) -->
    <div class="bg-stone-800 text-white p-5 rounded-b-3xl shadow-lg sticky top-0 z-20">
        <div class="flex justify-between items-start">
            <div>
                <h1 class="text-xl font-bold tracking-wide">☕ 多肉咖啡</h1>
                <p class="text-xs text-stone-400 mt-1">營業時間：12:00 - 20:00，每週三公休</p>
            </div>
            <div id="shop-status" class="bg-stone-700 px-3 py-1 rounded-full text-xs font-bold flex items-center border border-stone-600">
                <!-- JS 會自動填入內容 -->
                檢測中...
            </div>
        </div>
    </div>

    <!-- 2. 服務類型切換 (外送規則說明) -->
    <div class="p-4">
        <div class="bg-white p-1 rounded-full flex shadow-sm border border-gray-200 mb-3">
            <button id="btn-delivery" class="flex-1 py-2 rounded-full text-sm font-bold bg-stone-700 text-white transition-all" onclick="setServiceType('delivery')">
                🛵 外送配送
            </button>
            <button id="btn-pickup" class="flex-1 py-2 rounded-full text-sm font-bold text-gray-500 transition-all" onclick="setServiceType('pickup')">
                🛍️ 門市自取
            </button>
        </div>

        <div id="delivery-info" class="bg-orange-50 border border-orange-200 rounded-xl p-3 text-xs text-orange-800 shadow-sm">
            <div class="font-bold mb-1">📢 外送服務說明</div>
            <ul class="list-disc list-inside space-y-1 opacity-90">
                <li>餐點金額滿 <strong>$300</strong> 即可外送</li>
                <li>距離本店 <strong>5公里</strong> 內皆可送達</li>
                <li>酌收運費 <strong>$50</strong> ，訂單金額滿 <strong>$1000</strong> 免運費</li>
                <li>小店無法接受10杯以上大量訂單，敬請見諒</li>
            </ul>
        </div>
    </div>

    <!-- 3. 菜單列表 (無分類，單一列表) -->
    <div class="px-4 pb-4 grid gap-4" id="menu-container">
        <!-- JS 自動生成 -->
    </div>

    <!-- 4. 訂購人資訊 -->
    <div class="px-4 mt-2">
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
            <h3 class="font-bold text-gray-700 mb-3 border-b pb-2">📋 訂購資訊</h3>
            <div class="space-y-3">
                <input type="text" id="customerName" placeholder="您的稱呼 *" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg text-sm">
                <input type="tel" id="customerPhone" placeholder="聯絡電話 *" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg text-sm">
                
                <div id="address-field">
                    <input type="text" id="customerAddress" placeholder="外送地址 *(僅外送至一樓或管理室)" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg text-sm">
                </div>
                
                <textarea id="customerNote" rows="1" placeholder="備註" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg text-sm"></textarea>

                <!-- 付款方式 -->
                <div class="pt-2">
                    <label class="block text-sm font-bold text-gray-700 mb-2">付款方式</label>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="payment-option cursor-pointer">
                            <input type="radio" name="payment" value="現金" class="hidden" checked onchange="updatePaymentHint()">
                            <div class="border border-gray-200 rounded-lg p-3 text-center text-sm font-bold text-gray-500 transition-all">
                                💵 現金支付
                            </div>
                        </label>
                        <label class="payment-option cursor-pointer">
                            <input type="radio" name="payment" value="LINE Pay" class="hidden" onchange="updatePaymentHint()">
                            <div class="border border-gray-200 rounded-lg p-3 text-center text-sm font-bold text-gray-500 transition-all">
                                💳 LINE Pay
                            </div>
                        </label>
                    </div>
                    <p id="payment-hint" class="text-xs text-red-500 mt-2 hidden bg-red-50 p-2 rounded border border-red-100">
                        ⚠️ 選用 LINE Pay 付款，取餐時請備妥手機，我們將出示收款碼供您掃描。
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- 5. 底部結帳區 -->
    <div class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] z-30">
        <div class="flex justify-between items-end mb-3">
            <div class="text-sm text-gray-500">
                共 <span id="total-count" class="font-bold text-gray-800">0</span> 樣商品
            </div>
            <div class="text-right flex flex-col items-end">
                <div class="text-gray-800 font-bold text-lg leading-none">
                    小計 $<span id="subtotal-price">0</span>
                </div>
                <!-- 運費顯示 (移到右側，小計下方) -->
                <div id="shipping-fee-display" class="text-xs text-red-500 font-bold mt-1 hidden">
                    運費 +$60
                </div>
                <div id="min-order-hint" class="text-xs text-red-500 mt-1 hidden">外送未滿 $300</div>
            </div>
        </div>
        <button onclick="submitOrder()" id="submit-btn" class="w-full bg-stone-700 text-white font-bold py-3 rounded-xl shadow-md disabled:bg-gray-300 disabled:cursor-not-allowed" disabled>
            請先選擇商品
        </button>
    </div>

    <script>
        // ★★★ 請填入您的 LIFF ID ★★★
        const YOUR_LIFF_ID = "2008538785-jQ0Wm6px"; 

        // --- 設定與菜單資料 ---
        const MIN_DELIVERY_ORDER = 300;    // 外送最低消費
        const DELIVERY_FEE = 60;           // 運費
        const FREE_DELIVERY_THRESHOLD = 1000; // 免運門檻

        // type定義: 2=冷熱皆有, 1=僅熱, 0=僅冷, null=食物(無冷熱)
        const menuItems = [
            { id: 'c1', name: '美式咖啡', price: 80, type: 2, desc: '經典黑咖啡', img: 'https://placehold.co/100x100/3e2723/fff?text=Americano' },
            { id: 'c2', name: '拿鐵咖啡', price: 110, type: 2, desc: '濃縮咖啡與鮮奶', img: 'https://placehold.co/100x100/5d4037/fff?text=Latte' },
            { id: 'c3', name: '摩卡咖啡', price: 120, type: 2, desc: '巧克力風味咖啡', img: 'https://placehold.co/100x100/4e342e/fff?text=Mocha' },
            { id: 't1', name: '精選紅茶', price: 50, type: 2, desc: ' ', img: 'https://placehold.co/100x100/b71c1c/fff?text=BlackTea' },
            { id: 't2', name: '紅茶拿鐵', price: 80, type: 2, desc: '精選紅茶與鮮奶', img: 'https://placehold.co/100x100/a1887f/fff?text=MilkTea' },
            { id: 'd1', name: '可可牛奶', price: 60, type: 2, desc: '香濃巧克力牛奶', img: 'https://placehold.co/100x100/3e2723/fff?text=Cocoa' },
            { id: 'h1', name: '高山冬片茶', price: 60, type: 1, desc: '現泡熱茶，回甘不澀', img: 'https://placehold.co/100x100/689f38/fff?text=Tea' },
            { id: 'h2', name: '草莓風味果茶', price: 70, type: 1, desc: '酸甜莓果香氣', img: 'https://placehold.co/100x100/e91e63/fff?text=BerryTea' },
            { id: 'h3', name: '麝香葡萄風味茶', price: 80, type: 1, desc: '濃郁葡萄果香', img: 'https://placehold.co/100x100/8e24aa/fff?text=GrapeTea' },
            { id: 'ice1', name: '夏戀', price: 100, type: 0, desc: '紅茶基底果醋特調', img: 'https://placehold.co/100x100/039be5/fff?text=Summer' },
            { id: 'ice2', name: '阿尼亞', price: 150, type: 0, desc: '咖啡基底乳酸特調', img: 'https://placehold.co/100x100/ff6f00/fff?text=Anya' },
            { id: 'ice3', name: '可爾必思', price: 50, type: 0, desc: '酸甜乳酸飲料', img: 'https://placehold.co/100x100/f5f5f5/333?text=Calpis' },
            { id: 'f1', name: '原味鬆餅', price: 40, type: null, desc: ' ', img: 'https://placehold.co/100x100/ffb74d/fff?text=Waffle' },
            { id: 'f2', name: '榛果巧克力鬆餅', price: 60, type: null, desc: '巧克力醬', img: 'https://placehold.co/100x100/5d4037/fff?text=ChocoWaffle' },
            { id: 'f3', name: '草莓鬆餅', price: 60, type: null, desc: '草莓醬', img: 'https://placehold.co/100x100/e91e63/fff?text=BerryWaffle' },
            { id: 'f4', name: '麻糬鬆餅', price: 80, type: null, desc: '內餡Q彈麻糬', img: 'https://placehold.co/100x100/fff9c4/333?text=Mochi' },
            { id: 'f5', name: '嘉年華鬆餅', price: 100, type: null, desc: '麻糬夾心加巧克力與草莓果醬，三種味道一次滿足', img: 'https://placehold.co/100x100/f48fb1/fff?text=Carnival' },
            { id: 's1', name: '布丁', price: 60, type: null, desc: '手工焦糖布丁', img: 'https://placehold.co/100x100/ffecb3/333?text=Pudding' },
            { id: 's2', name: '香魚片', price: 50, type: null, desc: '涮嘴小零食', img: 'https://placehold.co/100x100/ef5350/fff?text=Fish' }
        ];

        // 購物車結構: cart['c1-hot'] = 2 (表示c1商品熱的2杯)
        let cart = {}; 
        let serviceType = 'delivery'; 
        let isStoreOpen = false;

        // --- 初始化 ---
        document.addEventListener('DOMContentLoaded', function() {
            liff.init({ liffId: YOUR_LIFF_ID }).catch(err => console.error(err));
            checkBusinessHours();
            renderMenu();
        });

        // 1. 營業時間判斷
        function checkBusinessHours() {
            const now = new Date();
            const hour = now.getHours();
            const statusEl = document.getElementById('shop-status');
            const submitBtn = document.getElementById('submit-btn');

            // 12:00 ~ 20:00 (包含12, 不包含20)
            if (hour >= 12 && hour < 20) {
                isStoreOpen = true;
                statusEl.innerHTML = '<span class="status-dot open"></span> 營業中';
                statusEl.classList.add('text-green-300');
            } else {
                isStoreOpen = false;
                statusEl.innerHTML = '<span class="status-dot closed"></span> 非營業時間';
                statusEl.classList.add('text-gray-300');
            }
        }

        // 2. 渲染菜單
        function renderMenu() {
            const container = document.getElementById('menu-container');
            
            const html = menuItems.map(item => {
                let controls = '';

                // 根據 type 生成控制項
                if (item.type === 2) { // 冷熱都有
                    controls = `
                        <div class="flex items-center justify-between mt-2">
                            <span class="text-xs font-bold text-red-500 mr-2 border border-red-200 px-1 rounded bg-red-50">熱飲</span>
                            <div class="flex items-center">
                                <div class="qty-btn minus-btn" onclick="updateCart('${item.id}', 'hot', -1)">-</div>
                                <span class="mx-2 font-bold w-4 text-center text-sm" id="qty-${item.id}-hot">0</span>
                                <div class="qty-btn plus-btn hot-theme" onclick="updateCart('${item.id}', 'hot', 1)">+</div>
                            </div>
                        </div>
                        <div class="flex items-center justify-between mt-2">
                            <span class="text-xs font-bold text-blue-500 mr-2 border border-blue-200 px-1 rounded bg-blue-50">冰飲</span>
                            <div class="flex items-center">
                                <div class="qty-btn minus-btn" onclick="updateCart('${item.id}', 'cold', -1)">-</div>
                                <span class="mx-2 font-bold w-4 text-center text-sm" id="qty-${item.id}-cold">0</span>
                                <div class="qty-btn plus-btn cold-theme" onclick="updateCart('${item.id}', 'cold', 1)">+</div>
                            </div>
                        </div>
                    `;
                } else if (item.type === 1) { // 僅熱
                    controls = `
                        <div class="flex items-center justify-between mt-2">
                            <span class="text-xs font-bold text-red-500 mr-2 border border-red-200 px-1 rounded bg-red-50">僅提供熱飲</span>
                            <div class="flex items-center">
                                <div class="qty-btn minus-btn" onclick="updateCart('${item.id}', 'hot', -1)">-</div>
                                <span class="mx-2 font-bold w-4 text-center text-sm" id="qty-${item.id}-hot">0</span>
                                <div class="qty-btn plus-btn hot-theme" onclick="updateCart('${item.id}', 'hot', 1)">+</div>
                            </div>
                        </div>
                    `;
                } else if (item.type === 0) { // 僅冷
                    controls = `
                        <div class="flex items-center justify-between mt-2">
                            <span class="text-xs font-bold text-blue-500 mr-2 border border-blue-200 px-1 rounded bg-blue-50">僅提供冰飲</span>
                            <div class="flex items-center">
                                <div class="qty-btn minus-btn" onclick="updateCart('${item.id}', 'cold', -1)">-</div>
                                <span class="mx-2 font-bold w-4 text-center text-sm" id="qty-${item.id}-cold">0</span>
                                <div class="qty-btn plus-btn cold-theme" onclick="updateCart('${item.id}', 'cold', 1)">+</div>
                            </div>
                        </div>
                    `;
                } else { // 食物 (無冷熱)
                    controls = `
                        <div class="flex items-center justify-end mt-2">
                            <div class="qty-btn minus-btn" onclick="updateCart('${item.id}', 'default', -1)">-</div>
                            <span class="mx-2 font-bold w-4 text-center text-sm" id="qty-${item.id}-default">0</span>
                            <div class="qty-btn plus-btn default-theme" onclick="updateCart('${item.id}', 'default', 1)">+</div>
                        </div>
                    `;
                }

                return `
                <div class="bg-white p-3 rounded-2xl flex shadow-sm border border-gray-100">
                    <img src="${item.img}" class="w-24 h-24 rounded-xl object-cover mr-4 flex-shrink-0">
                    <div class="flex-1 flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start">
                                <h3 class="font-bold text-gray-800">${item.name}</h3>
                                <span class="text-gray-900 font-bold">$${item.price}</span>
                            </div>
                            <p class="text-xs text-gray-400 mt-1 line-clamp-2">${item.desc}</p>
                        </div>
                        <div class="mt-1">
                            ${controls}
                        </div>
                    </div>
                </div>`;
            }).join('');

            container.innerHTML = html;
        }

        // 3. 購物車邏輯
        function updateCart(itemId, variant, change) {
            const key = `${itemId}-${variant}`;
            if (!cart[key]) cart[key] = 0;
            cart[key] += change;
            if (cart[key] < 0) cart[key] = 0;

            // 更新畫面
            document.getElementById(`qty-${key}`).innerText = cart[key];
            calculateTotal();
        }

        function calculateTotal() {
            let totalQty = 0;
            let foodPrice = 0;

            // 1. 計算餐點總金額 (小計)
            for (const [key, qty] of Object.entries(cart)) {
                if (qty > 0) {
                    const itemId = key.split('-')[0];
                    const item = menuItems.find(i => i.id === itemId);
                    totalQty += qty;
                    foodPrice += (item.price * qty);
                }
            }

            let finalPrice = foodPrice;
            const submitBtn = document.getElementById('submit-btn');
            const minOrderHint = document.getElementById('min-order-hint');
            const shippingFeeDisplay = document.getElementById('shipping-fee-display');

            // 更新介面上的小計
            document.getElementById('total-count').innerText = totalQty;
            document.getElementById('subtotal-price').innerText = foodPrice;

            // 2. 外送邏輯：檢查門檻 & 運費
            let canSubmit = true;
            if (serviceType === 'delivery') {
                // 最低消費檢查
                if (foodPrice < MIN_DELIVERY_ORDER) {
                    canSubmit = false;
                    minOrderHint.classList.remove('hidden');
                } else {
                    minOrderHint.classList.add('hidden');
                }

                // 運費計算 (有餐點才算運費)
                if (foodPrice > 0 && foodPrice < FREE_DELIVERY_THRESHOLD) {
                    finalPrice += DELIVERY_FEE;
                    shippingFeeDisplay.classList.remove('hidden');
                    shippingFeeDisplay.innerText = `運費 +$${DELIVERY_FEE}`;
                } else {
                    shippingFeeDisplay.classList.add('hidden');
                }
            } else {
                // 自取模式：無低消限制、無運費
                minOrderHint.classList.add('hidden');
                shippingFeeDisplay.classList.add('hidden');
            }

            // 3. 更新按鈕狀態與總金額顯示
            if (totalQty === 0) {
                submitBtn.disabled = true;
                submitBtn.innerText = "請先選擇商品";
                submitBtn.className = "w-full bg-gray-300 text-white font-bold py-3 rounded-xl cursor-not-allowed";
            } else if (!canSubmit && serviceType === 'delivery') {
                submitBtn.disabled = true;
                submitBtn.innerText = `未滿 $${MIN_DELIVERY_ORDER} 無法外送`;
                submitBtn.className = "w-full bg-gray-300 text-white font-bold py-3 rounded-xl cursor-not-allowed";
            } else {
                submitBtn.disabled = false;
                // 按鈕上顯示總計金額
                submitBtn.innerText = `送出訂單 (總計 $${finalPrice})`;
                submitBtn.className = "w-full bg-stone-700 hover:bg-stone-800 text-white font-bold py-3 rounded-xl shadow-md transition-transform transform active:scale-95";
            }
        }

        function setServiceType(type) {
            serviceType = type;
            const btnDelivery = document.getElementById('btn-delivery');
            const btnPickup = document.getElementById('btn-pickup');
            const addressField = document.getElementById('address-field');
            const deliveryInfo = document.getElementById('delivery-info');

            if (type === 'delivery') {
                btnDelivery.className = "flex-1 py-2 rounded-full text-sm font-bold bg-stone-700 text-white transition-all shadow-md";
                btnPickup.className = "flex-1 py-2 rounded-full text-sm font-bold text-gray-500 transition-all";
                addressField.style.display = 'block';
                deliveryInfo.style.display = 'block';
            } else {
                btnPickup.className = "flex-1 py-2 rounded-full text-sm font-bold bg-stone-700 text-white transition-all shadow-md";
                btnDelivery.className = "flex-1 py-2 rounded-full text-sm font-bold text-gray-500 transition-all";
                addressField.style.display = 'none';
                deliveryInfo.style.display = 'none';
            }
            calculateTotal(); // 切換模式時重新計算
        }

        function updatePaymentHint() {
            const payment = document.querySelector('input[name="payment"]:checked').value;
            const hint = document.getElementById('payment-hint');
            if (payment === 'LINE Pay') {
                hint.classList.remove('hidden');
            } else {
                hint.classList.add('hidden');
            }
        }

        // 4. 送出訂單
        function submitOrder() {
            const name = document.getElementById('customerName').value.trim();
            const phone = document.getElementById('customerPhone').value.trim();
            const address = document.getElementById('customerAddress').value.trim();
            const note = document.getElementById('customerNote').value.trim();
            const paymentMethod = document.querySelector('input[name="payment"]:checked').value;

            if (!name || !phone) {
                alert('請填寫「稱呼」與「電話」！');
                return;
            }
            if (serviceType === 'delivery' && !address) {
                alert('外送請填寫「地址」！');
                return;
            }

            // 組合訂單內容
            let orderDetails = "";
            let foodPrice = 0;
            
            for (const [key, qty] of Object.entries(cart)) {
                if (qty > 0) {
                    const [itemId, variant] = key.split('-');
                    const item = menuItems.find(i => i.id === itemId);
                    const subtotal = item.price * qty;
                    foodPrice += subtotal;
                    
                    let variantText = "";
                    if (variant === 'hot') variantText = "🔥 熱飲";
                    else if (variant === 'cold') variantText = "❄️ 冰飲";
                    
                    orderDetails += `▫️ ${item.name} ${variantText} x${qty} ($${subtotal})\n`;
                }
            }

            // 最終金額計算 (含運費邏輯)
            let totalPrice = foodPrice;
            let deliveryMsg = "";
            
            if (serviceType === 'delivery' && foodPrice < FREE_DELIVERY_THRESHOLD) {
                totalPrice += DELIVERY_FEE;
                deliveryMsg = `(含運費 $${DELIVERY_FEE})`;
            } else if (serviceType === 'delivery' && foodPrice >= FREE_DELIVERY_THRESHOLD) {
                deliveryMsg = `(已達免運)`;
            }

            const typeText = serviceType === 'delivery' ? '🛵 外送單' : '🛍️ 自取單';
            const addressLine = serviceType === 'delivery' ? `📍 地址：${address}\n` : '';
            let paymentNote = "";
            if (paymentMethod === 'LINE Pay') paymentNote = "\n(⚠️ 顧客將使用 LINE Pay，請出示收款碼)";

            const messageText = `【${typeText}】${paymentMethod}${paymentNote}\n\n` +
                                `👤 姓名：${name}\n` +
                                `📞 電話：${phone}\n` +
                                addressLine +
                                `📝 備註：${note || '無'}\n` +
                                `------------------\n` +
                                orderDetails +
                                `------------------\n` +
                                `💰 總金額：$${totalPrice} ${deliveryMsg}`;

            if (liff.isInClient()) {
                liff.sendMessages([{ type: 'text', text: messageText }])
                    .then(() => liff.closeWindow())
                    .catch(err => alert('發送失敗：' + err));
            } else {
                alert("電腦版預覽：\n\n" + messageText);
            }
        }
    </script>
</body>
</html>
